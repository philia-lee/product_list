name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: application.properties 파일 설정
      run: |
        mkdir -p backend/src/main/resources
        mkdir -p backend/src/test/resources
        echo "${{ secrets.APPLICATION_PROPERTIES }}" > ./backend/src/main/resources/application.properties
        echo "${{ secrets.TEST_APPLICATION_PROPERTIES }}" > ./backend/src/test/resources/application.properties    
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
    - name : 어디에 파일이 있나 확인하기
      run : ls -R
      working-directory: ./backend
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: ./backend
      
    - name: Build with Gradle Wrapper
      run: ./gradlew clean build
      working-directory: ./backend
      
    - name: 빌드된 파일 이름 변경하기
      run: mv ./backend/build/libs/*SNAPSHOT.jar ./cicdtest.jar
      
    - name: SCP로 EC2에 빌드된 파일 전송하기
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: cicdtest.jar
        target: /home/${{ secrets.USER }}
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@v4
      with:
        build-root-directory: ./backend
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: SSH로 EC2에 접속하기
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script_stop: true
        script: |
          set -e # 명령어중 하나라도 실패하면 스크립트 중단 및 에러 발생 
          cd /home/${{ secrets.USER }}
          cat << 'EOF' > Dockerfile
          FROM eclipse-temurin:21-jdk-jammy
          COPY cicdtest.jar app.jar
          ENTRYPOINT ["java", "-jar", "/app.jar"]
          EOF
          # 1. sudo를 추가하여 권한 문제 해결 & 이미지 이름(cicdtest-local) 명시
          docker stop cicdtestcontainer || true
          docker rm cicdtestcontainer || true
          docker build -t cicdtest-local .
          # 2 도커 가상 네트워크 생성
          docker network inspect my-bridge >/dev/null 2>&1 || docker network create my-bridge
          docker run -d \
          -p ${{ secrets.JAR_hostport }}:${{ secrets.JAR_localport }} \
          --name cicdtestcontainer \
          --network my-bridge \
          -e SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:${{ secrets.postgreport  }}/postgres \
          cicdtest-local
          
          sudo docker image prune -f



